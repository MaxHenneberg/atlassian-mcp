services:
  jira-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: jira-mcp-server:latest
    ports:
      - "${PORT:-8080}:8080"
    environment:
      JIRA_BASE_URL: "${JIRA_BASE_URL:?Set JIRA_BASE_URL, for example https://henneberg.atlassian.net}"
      JIRA_AUTH_MODE: "${JIRA_AUTH_MODE:-basic}"
      JIRA_EMAIL: "${JIRA_EMAIL:?Set JIRA_EMAIL to your Atlassian account email}"
      JIRA_PAT: "${JIRA_PAT:?Set JIRA_PAT to your Atlassian API token}"
      JIRA_API_VERSION: "${JIRA_API_VERSION:-3}"
      MCP_TOOLS_CONFIG: "/config/mcp-tools.json"
    volumes:
      - ./mcp-tools.json:/config/mcp-tools.json:ro
    restart: unless-stopped
